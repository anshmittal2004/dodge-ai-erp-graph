<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dodge AI — ERP Graph Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.29.2/cytoscape.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg: #080c12;
    --bg2: #0d1320;
    --bg3: #111827;
    --border: rgba(99,102,241,0.18);
    --border2: rgba(99,102,241,0.08);
    --accent: #6366f1;
    --accent2: #818cf8;
    --accent3: #a5b4fc;
    --green: #10b981;
    --amber: #f59e0b;
    --red: #ef4444;
    --pink: #ec4899;
    --teal: #14b8a6;
    --text: #f1f5f9;
    --text2: #94a3b8;
    --text3: #475569;
    --font-mono: 'JetBrains Mono', monospace;
    --font-sans: 'Syne', sans-serif;
    --radius: 12px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    background-image: 
      radial-gradient(ellipse 60% 40% at 70% 10%, rgba(99,102,241,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 20% 80%, rgba(16,185,129,0.05) 0%, transparent 60%);
  }

  /* ── LAYOUT ─────────────────────────────────── */
  .app { display: flex; flex-direction: column; height: 100vh; }

  .topbar {
    height: 52px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    background: rgba(8,12,18,0.95);
    backdrop-filter: blur(12px);
    position: relative;
    z-index: 50;
    flex-shrink: 0;
  }

  .logo {
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #818cf8, #10b981);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }

  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

  .topbar-stats { display: flex; gap: 12px; margin-left: 16px; }

  .stat-pill {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text2);
    letter-spacing: 0.02em;
  }
  .stat-pill span { color: var(--accent3); }

  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

  .conn-badge {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid rgba(16,185,129,0.3);
    background: rgba(16,185,129,0.08);
    color: var(--green);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── MAIN COLUMNS ────────────────────────────── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── GRAPH PANEL ─────────────────────────────── */
  .graph-panel {
    flex: 1;
    position: relative;
    background: var(--bg);
    overflow: hidden;
  }

  #cy {
    width: 100%;
    height: 100%;
    position: absolute;
    inset: 0;
  }

  .graph-overlay {
    position: absolute;
    bottom: 16px;
    left: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 10;
  }

  .graph-controls {
    display: flex;
    gap: 6px;
  }

  .ctrl-btn {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    background: rgba(13,19,32,0.9);
    backdrop-filter: blur(8px);
    border-radius: 8px;
    color: var(--text2);
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent3); background: rgba(99,102,241,0.1); }

  .node-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    max-width: 340px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 500;
    color: var(--text3);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* ── NODE INSPECTOR ──────────────────────────── */
  .node-inspector {
    position: absolute;
    top: 16px;
    left: 16px;
    width: 260px;
    background: rgba(13,19,32,0.95);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    backdrop-filter: blur(16px);
    padding: 14px;
    z-index: 20;
    box-shadow: var(--shadow);
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }

  .inspector-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .inspector-type {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 20px;
  }

  .inspector-close {
    width: 20px; height: 20px;
    border: 1px solid var(--border);
    background: none;
    border-radius: 4px;
    color: var(--text3);
    cursor: pointer;
    font-size: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .inspector-close:hover { color: var(--text); border-color: var(--border2); }

  .inspector-label {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 10px;
    word-break: break-all;
    color: var(--text);
  }

  .inspector-fields { display: flex; flex-direction: column; gap: 5px; }

  .inspector-field {
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }

  .field-key {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    flex-shrink: 0;
    padding-top: 1px;
  }

  .field-val {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text2);
    text-align: right;
    word-break: break-all;
  }

  /* ── CHAT PANEL ──────────────────────────────── */
  .chat-panel {
    width: 440px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-left: 1px solid var(--border);
    background: var(--bg2);
    position: relative;
  }

  .chat-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border2);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .chat-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .chat-subtitle {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text3);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-left: auto;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── MESSAGES ────────────────────────────────── */
  .msg {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: msgIn 0.2s ease;
  }
  @keyframes msgIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  .msg.user { align-items: flex-end; }
  .msg.assistant { align-items: flex-start; }

  .msg-role {
    font-family: var(--font-mono);
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 0 2px;
  }

  .msg-bubble {
    max-width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 12px;
    line-height: 1.6;
    word-break: break-word;
  }

  .msg.user .msg-bubble {
    background: rgba(99,102,241,0.15);
    border: 1px solid rgba(99,102,241,0.25);
    color: var(--text);
    border-bottom-right-radius: 3px;
  }

  .msg.assistant .msg-bubble {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    border-bottom-left-radius: 3px;
    width: 100%;
  }

  .msg.assistant.error .msg-bubble {
    border-color: rgba(239,68,68,0.3);
    background: rgba(239,68,68,0.06);
  }

  .msg.guardrail .msg-bubble {
    border-color: rgba(245,158,11,0.3);
    background: rgba(245,158,11,0.06);
  }

  /* ── SQL ACCORDION ────────────────────────────── */
  .sql-accordion {
    margin-top: 8px;
    border: 1px solid var(--border2);
    border-radius: 8px;
    overflow: hidden;
  }

  .sql-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: rgba(13,19,32,0.6);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border: none;
    width: 100%;
    text-align: left;
    transition: all 0.15s;
  }
  .sql-toggle:hover { color: var(--accent3); background: rgba(99,102,241,0.08); }

  .sql-body {
    padding: 10px;
    background: rgba(8,12,18,0.8);
    font-family: var(--font-mono);
    font-size: 10px;
    color: #a5b4fc;
    line-height: 1.5;
    overflow-x: auto;
    white-space: pre;
  }

  /* ── DATA TABLE ───────────────────────────────── */
  .data-table-wrapper {
    margin-top: 8px;
    border: 1px solid var(--border2);
    border-radius: 8px;
    overflow: hidden;
    max-height: 200px;
    overflow-y: auto;
  }

  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--font-mono);
    font-size: 9px;
  }

  .data-table th {
    background: rgba(13,19,32,0.9);
    color: var(--text3);
    padding: 5px 8px;
    text-align: left;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
    border-bottom: 1px solid var(--border2);
    position: sticky;
    top: 0;
  }

  .data-table td {
    padding: 4px 8px;
    color: var(--text2);
    border-bottom: 1px solid rgba(99,102,241,0.05);
    white-space: nowrap;
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .data-table tr:hover td { background: rgba(99,102,241,0.04); }
  .data-table tr:last-child td { border-bottom: none; }

  /* ── SUGGESTED QUERIES ────────────────────────── */
  .suggestions {
    padding: 10px 12px;
    border-top: 1px solid var(--border2);
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    flex-shrink: 0;
  }

  .suggestion-chip {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .suggestion-chip:hover {
    border-color: var(--accent);
    color: var(--accent3);
    background: rgba(99,102,241,0.08);
  }

  /* ── CHAT INPUT ───────────────────────────────── */
  .chat-input-area {
    padding: 12px;
    border-top: 1px solid var(--border2);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    background: var(--bg2);
  }

  .chat-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
    resize: none;
    min-height: 40px;
    max-height: 100px;
  }
  .chat-input:focus { border-color: rgba(99,102,241,0.5); }
  .chat-input::placeholder { color: var(--text3); }

  .send-btn {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent), #4f46e5);
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(99,102,241,0.4); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ── LOADING ──────────────────────────────────── */
  .thinking {
    display: flex;
    gap: 4px;
    padding: 6px 0;
    align-items: center;
  }
  .thinking span {
    width: 5px; height: 5px;
    background: var(--accent2);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(0.8);opacity:0.5} 40%{transform:scale(1.2);opacity:1} }

  /* ── MARKDOWN STYLES ──────────────────────────── */
  .msg-content strong { color: var(--accent3); font-weight: 700; }
  .msg-content em { color: var(--text2); font-style: italic; }
  .msg-content code {
    font-family: var(--font-mono);
    font-size: 10px;
    background: rgba(99,102,241,0.1);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--accent3);
  }

  /* ── GRAPH SEARCH ─────────────────────────────── */
  .graph-search {
    position: absolute;
    top: 16px;
    right: 16px;
    z-index: 20;
  }

  .search-input {
    background: rgba(13,19,32,0.92);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    outline: none;
    width: 200px;
    backdrop-filter: blur(12px);
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: rgba(99,102,241,0.5); width: 260px; }
  .search-input::placeholder { color: var(--text3); }

  /* ── RESPONSIVE ───────────────────────────────── */
  @media (max-width: 900px) {
    .chat-panel { width: 340px; }
    .topbar-stats { display: none; }
  }

  /* ── HIGHLIGHTED NODE ─────────────────────────── */
  .node-highlighted {
    border: 3px solid var(--amber) !important;
    box-shadow: 0 0 20px rgba(245,158,11,0.5) !important;
  }

  /* ── INSIGHTS PANEL ──────────────────────────────── */
  .insights-panel {
    position: absolute;
    top: 52px;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--bg);
    z-index: 40;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .insights-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .insights-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
    padding: 16px 20px;
    overflow-y: auto;
    flex: 1;
  }

  .insight-card {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 16px;
    animation: msgIn 0.3s ease;
  }

  .insight-card-title {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .insight-kpi {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  .kpi-box {
    flex: 1;
    min-width: 80px;
    background: var(--bg3);
    border-radius: 8px;
    padding: 10px 12px;
    border: 1px solid var(--border2);
  }

  .kpi-value {
    font-family: var(--font-mono);
    font-size: 18px;
    font-weight: 700;
    color: var(--accent3);
    line-height: 1;
    margin-bottom: 3px;
  }

  .kpi-label {
    font-family: var(--font-mono);
    font-size: 8px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .insight-bar-chart { display: flex; flex-direction: column; gap: 5px; }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 9px;
  }

  .bar-label {
    width: 140px;
    flex-shrink: 0;
    color: var(--text2);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .bar-track {
    flex: 1;
    height: 6px;
    background: var(--bg3);
    border-radius: 3px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
  }

  .bar-count {
    width: 30px;
    text-align: right;
    color: var(--text3);
    flex-shrink: 0;
  }

  .broken-flow-list { display: flex; flex-direction: column; gap: 4px; max-height: 200px; overflow-y: auto; }

  .broken-flow-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    background: var(--bg3);
    border-radius: 6px;
    border: 1px solid rgba(239,68,68,0.1);
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text2);
  }

  .broken-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--red); flex-shrink: 0; }

  .tab-btn {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.15s;
  }
  .tab-btn.active {
    background: rgba(99,102,241,0.15);
    border-color: rgba(99,102,241,0.4);
    color: var(--accent3);
  }
  .tab-btn:hover:not(.active) { border-color: var(--border); color: var(--text); }

</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const API = window.location.hostname === 'localhost' 
  ? 'http://localhost:8000' 
  : '';

const NODE_COLORS = {
  customer: '#6366f1',
  delivery: '#10b981',
  billing: '#f59e0b',
  journal_entry: '#8b5cf6',
  product: '#ec4899',
  plant: '#14b8a6',
  sales_order: '#3b82f6',
  ar_item: '#ef4444',
};

const SUGGESTIONS = [
  "Which products have the most billing documents?",
  "Show deliveries with no billing (broken flows)",
  "Trace billing document 90504248",
  "Top 5 customers by total billed amount",
  "Which deliveries are blocked?",
  "Show all cancelled billing documents",
  "Uncleared journal entries (unpaid)",
  "Average order value per customer",
];

// ── Simple markdown renderer ──────────────────────────────────────────────
function renderMD(text) {
  if (!text) return '';
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br/>');
}

// ── DataTable component ───────────────────────────────────────────────────
function DataTable({ rows }) {
  if (!rows || rows.length === 0) return null;
  const cols = Object.keys(rows[0]);
  return (
    <div className="data-table-wrapper">
      <table className="data-table">
        <thead>
          <tr>{cols.map(c => <th key={c}>{c}</th>)}</tr>
        </thead>
        <tbody>
          {rows.slice(0, 30).map((row, i) => (
            <tr key={i}>
              {cols.map(c => (
                <td key={c} title={String(row[c] ?? '')}>
                  {row[c] == null ? '—' : String(row[c]).substring(0, 30)}
                </td>
              ))}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ── Message component ─────────────────────────────────────────────────────
function Message({ msg, onHighlight }) {
  const [sqlOpen, setSqlOpen] = useState(false);
  const [tableOpen, setTableOpen] = useState(false);

  useEffect(() => {
    if (msg.highlighted_nodes?.length > 0 && onHighlight) {
      onHighlight(msg.highlighted_nodes);
    }
  }, [msg.highlighted_nodes]);

  return (
    <div className={`msg ${msg.role} ${msg.guardrail ? 'guardrail' : ''} ${msg.error ? 'error' : ''}`}>
      <div className="msg-role">{msg.role === 'user' ? 'You' : 'ERP Intelligence'}</div>
      <div className="msg-bubble">
        {msg.thinking ? (
          <div className="thinking"><span/><span/><span/></div>
        ) : (
          <div 
            className="msg-content"
            dangerouslySetInnerHTML={{ __html: renderMD(msg.content) }}
          />
        )}

        {msg.sql && (
          <div className="sql-accordion">
            <button className="sql-toggle" onClick={() => setSqlOpen(!sqlOpen)}>
              ⚡ {sqlOpen ? '▾' : '▸'} Generated SQL
            </button>
            {sqlOpen && <div className="sql-body">{msg.sql}</div>}
          </div>
        )}

        {msg.data && msg.data.length > 0 && (
          <div className="sql-accordion" style={{marginTop: 6}}>
            <button className="sql-toggle" onClick={() => setTableOpen(!tableOpen)}>
              📊 {tableOpen ? '▾' : '▸'} Raw Data ({msg.data.length} rows)
            </button>
            {tableOpen && <DataTable rows={msg.data} />}
          </div>
        )}

        {msg.highlighted_nodes?.length > 0 && (
          <div style={{marginTop: 8, fontSize: 9, fontFamily: 'JetBrains Mono, monospace', color: 'var(--amber)', letterSpacing: '0.04em'}}>
            ◆ {msg.highlighted_nodes.length} nodes highlighted on graph
          </div>
        )}
      </div>
    </div>
  );
}

// ── NodeInspector component ───────────────────────────────────────────────
function NodeInspector({ node, onClose }) {
  if (!node) return null;
  const data = node.data || {};
  const type = node.type;
  const colorStyle = { 
    background: `${NODE_COLORS[type]}20`, 
    border: `1px solid ${NODE_COLORS[type]}40`,
    color: NODE_COLORS[type]
  };

  const fields = Object.entries(data)
    .filter(([k, v]) => v != null && v !== '' && v !== false && k !== 'id');

  return (
    <div className="node-inspector">
      <div className="inspector-header">
        <span className="inspector-type" style={colorStyle}>{type?.replace('_', ' ')}</span>
        <button className="inspector-close" onClick={onClose}>✕</button>
      </div>
      <div className="inspector-label">{node.label}</div>
      <div className="inspector-fields">
        {fields.map(([k, v]) => (
          <div className="inspector-field" key={k}>
            <span className="field-key">{k.replace(/([A-Z])/g, ' $1').toLowerCase()}</span>
            <span className="field-val">{String(v).substring(0, 40)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}


// ── InsightsPanel component ────────────────────────────────────────────────
function InsightsPanel({ onClose }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    fetch(`${API}/api/insights`)
      .then(r => r.json())
      .then(d => { setData(d); setLoading(false); })
      .catch(() => setLoading(false));
  }, []);

  const fmt = (n) => {
    if (n == null) return '—';
    const num = parseFloat(n);
    if (isNaN(num)) return n;
    if (num >= 1000000) return `₹${(num/1000000).toFixed(1)}M`;
    if (num >= 1000) return `₹${(num/1000).toFixed(1)}K`;
    return `₹${num.toFixed(0)}`;
  };

  const maxVal = (arr, key) => Math.max(...arr.map(r => parseFloat(r[key]) || 0), 1);

  if (loading) return (
    <div className="insights-panel">
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',flex:1}}>
        <div className="thinking"><span/><span/><span/></div>
      </div>

  const topCustomers = data?.top_customers_by_revenue || [];

  return (
    <div className="insights-panel">

        <button

      </div>

      <div className="insights-grid">

        {/* KPI Row */}
        <div className="insight-card" style={{gridColumn:'1/-1'}}>
          <div className="insight-card-title">📈 Dataset Overview</div>
          <div className="insight-kpi">
            {[
              { label: 'Total Revenue', val: fmt(totalRevenue), color: 'var(--green)' },
              { label: 'Total Invoices', val: totalInvoices, color: 'var(--accent3)' },
              { label: 'Broken Flows', val: brokenFlows.length, color: 'var(--red)' },
              { label: 'Cancelled Billing', val: cancelled.total_cancelled || 0, color: 'var(--amber)' },
              { label: 'Cancelled Value', val: fmt(cancelled.cancelled_value), color: 'var(--amber)' },
              { label: 'Uncleared AR', val: uncleared.uncleared_count || 0, color: 'var(--pink)' },
            ].map(kpi => (
              <div className="kpi-box" key={kpi.label}>
                <div className="kpi-value" style={{color: kpi.color}}>{kpi.val}</div>
                <div className="kpi-label">{kpi.label}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Top Products */}
        <div className="insight-card">
          <div className="insight-card-title">🛍️ Top Products by Billing Count</div>
          <div className="insight-bar-chart">
            {topProducts.slice(0,8).map((p, i) => (
              <div className="bar-row" key={i}>
                <span className="bar-label" title={p.name}>{p.name || p.product_id}</span>
                <div className="bar-track">
                  <div className="bar-fill" style={{
                    width: `${(p.billing_count / maxVal(topProducts,'billing_count')) * 100}%`,
                    background: 'var(--pink)'

            ))}

        {/* Top Customers */}
        <div className="insight-card">
          <div className="insight-card-title">👥 Top Customers by Revenue</div>
          <div className="insight-bar-chart">
            {topCustomers.slice(0,8).map((c, i) => (
              <div className="bar-row" key={i}>
                <span className="bar-label" title={c.name}>{c.name || c.customer_id}</span>
                <div className="bar-track">
                  <div className="bar-fill" style={{
                    width: `${(parseFloat(c.total_revenue||0) / maxVal(topCustomers,'total_revenue')) * 100}%`,
                    background: 'var(--accent)'
                  }}/>
                </div>
                <span className="bar-count">{fmt(c.total_revenue)}</span>

        {/* Broken Flows */}

                <span style={{marginLeft:'auto',color:'var(--text3)'}}>

        {/* Billing by Type */}

          <div className="insight-card-title">📄 Billing Document Types</div>

              <div className="bar-row" key={i}>
                <span className="bar-label">{t.billingDocumentType || 'Unknown'}</span>
                <div className="bar-track">
                  <div className="bar-fill" style={{
                    width: `${(t.count / maxVal(byType,'count')) * 100}%`,
                    background: 'var(--teal)'
                  }}/>
                </div>
                <span className="bar-count">{t.count}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Plants by Delivery */}
        <div className="insight-card">
          <div className="insight-card-title">🏭 Top Plants by Delivery Count</div>
          <div className="insight-bar-chart">
            {plants.slice(0,8).map((p, i) => (
              <div className="bar-row" key={i}>
                <span className="bar-label" title={p.plantName}>{p.plantName || p.plant}</span>
                <div className="bar-track">
                  <div className="bar-fill" style={{
                    width: `${(p.delivery_count / maxVal(plants,'delivery_count')) * 100}%`,
                    background: 'var(--teal)'
                  }}/>
                </div>
                <span className="bar-count">{p.delivery_count}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Monthly Revenue */}
        {monthly.length > 0 && (
          <div className="insight-card" style={{gridColumn:'1/-1'}}>
            <div className="insight-card-title">📅 Monthly Revenue Trend</div>
            <div style={{display:'flex',gap:6,alignItems:'flex-end',height:80,padding:'0 4px'}}>
              {monthly.map((m, i) => {
                const pct = (parseFloat(m.revenue||0) / maxVal(monthly,'revenue'));
                return (
                  <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                    <div style={{
                      width:'100%',
                      height: Math.max(4, pct * 64) + 'px',

// ── Main App ──────────────────────────────────────────────────────────────
function App() {
  const cyRef = useRef(null);
  const cyInstance = useRef(null);
  const messagesEndRef = useRef(null);
  const inputRef = useRef(null);

  const [graphData, setGraphData] = useState(null);
  const [stats, setStats] = useState({});
  const [messages, setMessages] = useState([{
    id: 0,
    role: 'assistant',
    content: '**ERP Intelligence System initialized.** 🚀\n\nI can query your SAP dataset using natural language. The graph shows real relationships between Sales Orders, Deliveries, Billing Documents, Journal Entries, Customers, Products, and Plants.\n\nTry asking: *"Which products have the highest billing volume?"*',
  }]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [selectedNode, setSelectedNode] = useState(null);
  const [graphStats, setGraphStats] = useState({ nodes: 0, edges: 0 });
  const [highlightedNodes, setHighlightedNodes] = useState([]);
  const [backendStatus, setBackendStatus] = useState('connecting');
  const [showInsights, setShowInsights] = useState(false);
  const [filterType, setFilterType] = useState('all');

  // Check backend health
  useEffect(() => {
    fetch(`${API}/health`)
      .then(r => r.json())
      .then(() => setBackendStatus('connected'))
      .catch(() => setBackendStatus('offline'));

    fetch(`${API}/api/stats`)
      .then(r => r.json())
      .then(s => setStats(s))
      .catch(() => {});
  }, []);

  // Load graph data
  useEffect(() => {
    fetch(`${API}/api/graph`)
      .then(r => r.json())
      .then(data => {
        setGraphData(data);
        setGraphStats({ nodes: data.nodes.length, edges: data.edges.length });
      })
      .catch(e => console.error('Graph load failed:', e));
  }, []);

  // Initialize Cytoscape
  useEffect(() => {
    if (!graphData || !cyRef.current) return;

    const elements = [
      ...graphData.nodes.map(n => ({
        data: {
          id: n.id,
          label: n.label.length > 22 ? n.label.substring(0, 20) + '…' : n.label,
          fullLabel: n.label,
          type: n.type,
          color: n.color,
          size: n.size,
          meta: n.data,
        }
      })),
      ...graphData.edges.map(e => ({
        data: {
          id: e.id,
          source: e.source,
          target: e.target,
          label: e.label,
        }
      }))
    ];

    const cy = cytoscape({
      container: cyRef.current,
      elements,
      style: [
        {
          selector: 'node',
          style: {
            'background-color': 'data(color)',
            'label': 'data(label)',
            'color': '#f1f5f9',
            'font-size': '8px',
            'font-family': 'JetBrains Mono, monospace',
            'font-weight': '600',
            'text-valign': 'bottom',
            'text-halign': 'center',
            'text-margin-y': '3px',
            'width': 'data(size)',
            'height': 'data(size)',
            'border-width': '1.5px',
            'border-color': 'rgba(255,255,255,0.15)',
            'text-outline-color': '#080c12',
            'text-outline-width': '2px',
            'overlay-padding': '4px',
            'transition-property': 'background-color, border-color, width, height',
            'transition-duration': '0.2s',
          }
        },
        {
          selector: 'node:hover',
          style: {
            'border-color': '#f1f5f9',
            'border-width': '2px',
            'width': (ele) => ele.data('size') * 1.3,
            'height': (ele) => ele.data('size') * 1.3,
          }
        },
        {
          selector: 'node.highlighted',
          style: {
            'border-color': '#f59e0b',
            'border-width': '3px',
            'background-color': '#f59e0b',
            'width': (ele) => ele.data('size') * 1.5,
            'height': (ele) => ele.data('size') * 1.5,
          }
        },
        {
          selector: 'node.selected',
          style: {
            'border-color': '#818cf8',
            'border-width': '3px',
          }
        },
        {
          selector: 'edge',
          style: {
            'width': 1,
            'line-color': 'rgba(99,102,241,0.2)',
            'target-arrow-color': 'rgba(99,102,241,0.35)',
            'target-arrow-shape': 'triangle',
            'curve-style': 'bezier',
            'label': '',
            'arrow-scale': 0.6,
            'transition-property': 'line-color, width',
            'transition-duration': '0.2s',
          }
        },
        {
          selector: 'edge:hover',
          style: {
            'line-color': 'rgba(99,102,241,0.6)',
            'width': 2,
            'label': 'data(label)',
            'font-size': '7px',
            'font-family': 'JetBrains Mono, monospace',
            'color': 'rgba(165,180,252,0.9)',
            'text-background-color': '#080c12',
            'text-background-opacity': 1,
            'text-background-padding': '2px',
          }
        },
        {
          selector: 'edge.highlighted',
          style: {
            'line-color': 'rgba(245,158,11,0.5)',
            'width': 2,
          }
        },
        {
          selector: '.faded',
          style: { 'opacity': 0.15 }
        }
      ],
      layout: {
        name: 'cose',
        idealEdgeLength: 80,
        nodeOverlap: 20,
        refresh: 20,
        fit: true,
        padding: 40,
        randomize: false,
        componentSpacing: 80,
        nodeRepulsion: 450000,
        edgeElasticity: 100,
        nestingFactor: 5,
        gravity: 80,
        numIter: 1000,
        initialTemp: 200,
        coolingFactor: 0.95,
        minTemp: 1.0,
        animate: false,
      },
      userZoomingEnabled: true,
      userPanningEnabled: true,
      minZoom: 0.1,
      maxZoom: 5,
    });

    // Node click → inspector
    cy.on('tap', 'node', (evt) => {
      const node = evt.target;
      cy.$('.selected').removeClass('selected');
      node.addClass('selected');
      setSelectedNode({
        id: node.id(),
        label: node.data('fullLabel'),
        type: node.data('type'),
        data: node.data('meta'),
      });
    });

    // Background click → deselect
    cy.on('tap', (evt) => {
      if (evt.target === cy) {
        cy.$('.selected').removeClass('selected');
        setSelectedNode(null);
      }
    });

    cyInstance.current = cy;
    return () => { if (cyInstance.current) cyInstance.current.destroy(); };
  }, [graphData]);

  // Highlight nodes from chat responses
  useEffect(() => {
    const cy = cyInstance.current;
    if (!cy) return;
    cy.$('.highlighted').removeClass('highlighted');
    if (highlightedNodes.length > 0) {
      highlightedNodes.forEach(id => {
        const node = cy.$(`#${id}`);
        if (node.length > 0) node.addClass('highlighted');
      });
      // Fit to highlighted
      const highlighted = cy.$('.highlighted');
      if (highlighted.length > 0) {
        cy.animate({ fit: { eles: highlighted, padding: 80 } }, { duration: 600 });
      }
    }
  }, [highlightedNodes]);

  // Filter by type
  useEffect(() => {
    const cy = cyInstance.current;
    if (!cy) return;
    cy.$('*').removeClass('faded');
    if (filterType !== 'all') {
      cy.nodes().forEach(node => {
        if (node.data('type') !== filterType) node.addClass('faded');
      });
    }
  }, [filterType]);

  // Auto-scroll messages
  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages]);

  const sendMessage = useCallback(async (text) => {
    const q = text.trim();
    if (!q || loading) return;

    const userMsg = { id: Date.now(), role: 'user', content: q };
    const thinkingMsg = { id: Date.now() + 1, role: 'assistant', thinking: true, content: '' };

    setMessages(prev => [...prev, userMsg, thinkingMsg]);
    setInput('');
    setLoading(true);

    try {
      const history = messages.slice(-6).map(m => ({
        role: m.role,
        content: m.content,
      }));

      const response = await fetch(`${API}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: q, history }),
      });

      const data = await response.json();

      const assistantMsg = {
        id: Date.now() + 2,
        role: 'assistant',
        content: data.answer,
        sql: data.sql,
        data: data.data,
        highlighted_nodes: data.highlighted_nodes || [],
        guardrail: data.guardrail_triggered,
        error: !!data.error,
      };

      setMessages(prev => prev.filter(m => !m.thinking).concat(assistantMsg));

      if (data.highlighted_nodes?.length > 0) {
        setHighlightedNodes(data.highlighted_nodes);
      }
    } catch (err) {
      setMessages(prev => prev.filter(m => !m.thinking).concat({
        id: Date.now() + 3,
        role: 'assistant',
        content: `Connection error: ${err.message}. Make sure the backend is running on port 8000.`,
        error: true,
      }));
    } finally {
      setLoading(false);
    }
  }, [messages, loading]);

  const handleKeyDown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(input);
    }
  };

  const zoomIn = () => cyInstance.current?.zoom(cyInstance.current.zoom() * 1.3);
  const zoomOut = () => cyInstance.current?.zoom(cyInstance.current.zoom() * 0.77);
  const fitGraph = () => cyInstance.current?.fit(undefined, 40);
  const resetHighlights = () => {
    cyInstance.current?.$('.highlighted').removeClass('highlighted');
    setHighlightedNodes([]);
  };

  const nodeTypes = Object.keys(NODE_COLORS);

  return (
    <div className="app">
      {/* ── TOP BAR ── */}
      <div className="topbar">
        <div className="logo">
          <div className="logo-dot" />
          DODGE AI · ERP Graph Intelligence
        </div>
        <div className="topbar-stats">
          <span className="stat-pill">Nodes: <span>{graphStats.nodes}</span></span>
          <span className="stat-pill">Edges: <span>{graphStats.edges}</span></span>
          <span className="stat-pill">Billing: <span>{stats.billing_header || '—'}</span></span>
          <span className="stat-pill">Deliveries: <span>{stats.delivery_header || '—'}</span></span>
          <span className="stat-pill">Products: <span>{stats.products || '—'}</span></span>
        </div>
        <div className="topbar-right">
          <button
          className="ctrl-btn"
          style={{width:'auto',padding:'0 12px',fontSize:10,fontFamily:'JetBrains Mono,monospace',
            letterSpacing:'0.04em',
            ...(showInsights ? {borderColor:'var(--accent)',color:'var(--accent3)',background:'rgba(99,102,241,0.1)'} : {})
          }}
          onClick={() => setShowInsights(!showInsights)}
        >
          {showInsights ? '◀ Graph' : '📊 Insights'}
        </button>
        <span className={`conn-badge`} style={{
            color: backendStatus === 'connected' ? 'var(--green)' : 'var(--amber)',
            borderColor: backendStatus === 'connected' ? 'rgba(16,185,129,0.3)' : 'rgba(245,158,11,0.3)',
            background: backendStatus === 'connected' ? 'rgba(16,185,129,0.08)' : 'rgba(245,158,11,0.08)',
          }}>
            {backendStatus === 'connected' ? '● Live' : '◌ Offline'}
          </span>
        </div>
      </div>

      {/* ── INSIGHTS OVERLAY ── */}
      {showInsights && (
        <InsightsPanel onClose={() => setShowInsights(false)} />
      )}

      {/* ── MAIN ── */}
      <div className="main" style={{display: showInsights ? 'none' : 'flex'}}>
        {/* ── GRAPH PANEL ── */}
        <div className="graph-panel">
          <div id="cy" ref={cyRef} />

          {/* Node Inspector */}
          {selectedNode && (
            <NodeInspector node={selectedNode} onClose={() => setSelectedNode(null)} />
          )}

          {/* Search */}
          <div className="graph-search">
            <input
              className="search-input"
              placeholder="🔍 Search node..."
              onChange={e => {
                const q = e.target.value.toLowerCase();
                const cy = cyInstance.current;
                if (!cy) return;
                cy.$('*').removeClass('faded');
                if (q.length > 1) {
                  cy.nodes().forEach(n => {
                    if (!n.data('fullLabel')?.toLowerCase().includes(q) && 
                        !n.id().toLowerCase().includes(q)) {
                      n.addClass('faded');
                    }
                  });
                }
              }}
            />
          </div>

          {/* Bottom overlay */}
          <div className="graph-overlay">
            <div className="graph-controls">
              <button className="ctrl-btn" onClick={zoomIn} title="Zoom in">+</button>
              <button className="ctrl-btn" onClick={zoomOut} title="Zoom out">−</button>
              <button className="ctrl-btn" onClick={fitGraph} title="Fit">⊞</button>
              <button className="ctrl-btn" onClick={resetHighlights} title="Clear highlights">✦</button>
            </div>
            <div style={{display:'flex', gap:6, flexWrap:'wrap', maxWidth:300}}>
              <button
                className="ctrl-btn"
                style={{width:'auto', padding:'0 8px', fontSize:9, 
                  fontFamily:'JetBrains Mono,monospace', letterSpacing:'0.04em',
                  ...(filterType==='all' ? {borderColor:'var(--accent)', color:'var(--accent3)'} : {})
                }}
                onClick={() => setFilterType('all')}
              >ALL</button>
              {nodeTypes.map(t => (
                <button
                  key={t}
                  className="ctrl-btn"
                  style={{width:'auto', padding:'0 8px', fontSize:9,
                    fontFamily:'JetBrains Mono,monospace', letterSpacing:'0.04em',
                    borderColor: filterType===t ? NODE_COLORS[t] : undefined,
                    color: filterType===t ? NODE_COLORS[t] : undefined,
                  }}
                  onClick={() => setFilterType(filterType===t ? 'all' : t)}
                  title={`Filter: ${t}`}
                >{t.replace('_',' ').toUpperCase().substring(0,4)}</button>
              ))}
            </div>
            <div className="node-legend">
              {nodeTypes.map(t => (
                <div key={t} className="legend-item">
                  <div className="legend-dot" style={{background: NODE_COLORS[t]}} />
                  {t.replace('_', ' ')}
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* ── CHAT PANEL ── */}
        <div className="chat-panel">
          <div className="chat-header">
            <span style={{fontSize:14}}>💬</span>
            <div>
              <div className="chat-title">Query Interface</div>
            </div>
            <span className="chat-subtitle">NL → SQL → Answer</span>
          </div>

          <div className="chat-messages">
            {messages.map(msg => (
              <Message
                key={msg.id}
                msg={msg}
                onHighlight={setHighlightedNodes}
              />
            ))}
            <div ref={messagesEndRef} />
          </div>

          {/* Suggestions */}
          <div className="suggestions">
            {SUGGESTIONS.map((s, i) => (
              <button
                key={i}
                className="suggestion-chip"
                onClick={() => sendMessage(s)}
                disabled={loading}
              >
                {s.substring(0, 32)}{s.length > 32 ? '…' : ''}
              </button>
            ))}
          </div>

          {/* Input */}
          <div className="chat-input-area">
            <textarea
              ref={inputRef}
              className="chat-input"
              placeholder="Ask about your ERP data..."
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={handleKeyDown}
              rows={1}
            />
            <button
              className="send-btn"
              onClick={() => sendMessage(input)}
              disabled={loading || !input.trim()}
            >
              {loading ? '⟳' : '↑'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

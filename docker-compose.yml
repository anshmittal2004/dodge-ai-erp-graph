version: "3.9"

services:
  backend:
    build: ./backend
    container_name: dodge-ai-backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./data:/app/data:ro
      - db_data:/app/db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: dodge-ai-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
